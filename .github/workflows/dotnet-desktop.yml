name: Build Portable BSDPI AI

on:
  push:
    tags:
      - 'v*'            # Сборка портабл-релиза при пуше тега vX.Y.Z
  workflow_dispatch:    # Ручной запуск из вкладки Actions
    inputs:
      version:
        description: 'Версия релиза (без префикса v), напр. 1.7.7'
        required: false
        default: ''

permissions:
  contents: write      # Создание релиза и загрузка артефакта

jobs:
  build-portable:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          # Приоритет: явная версия из dispatch -> тег -> версия из csproj.
          $ver = "${{ github.event.inputs.version }}".Trim()
          if ([string]::IsNullOrEmpty($ver)) {
            if ("${{ github.ref_type }}" -eq 'tag') {
              $ver = "${{ github.ref_name }}" -replace '^v', ''
            } else {
              [xml]$csproj = Get-Content .\BSDPI\BSDPI.csproj
              $ver = $csproj.Project.PropertyGroup.Version
            }
          }
          $tag = "v$ver"
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Building portable release $tag"

      - name: Restore solution
        run: dotnet restore .\BSDPI.slnx

      - name: Run tests
        run: dotnet test .\BSDPI.slnx --configuration Release --no-restore --verbosity normal
        continue-on-error: true   # Тесты не блокируют сборку портабл-артефакта

      - name: Publish self-contained win-x64
        run: dotnet publish .\BSDPI\BSDPI.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o .\publish

      - name: Bundle Flowseal engine
        shell: pwsh
        run: |
          # engine/ (winws.exe, WinDivert.dll, BAT-профили) не входит в сборку .NET,
          # но необходим для работы zapret. Копируем из репозитория в publish,
          # чтобы портабельный релиз был самодостаточным.
          if (Test-Path .\engine) {
            Copy-Item -Recurse -Force .\engine .\publish\engine
            Write-Host "Engine bundled into publish/engine"
          } else {
            Write-Warning "engine/ not found in repo - portable release will lack winws.exe"
          }

      - name: Bundle TG WS Proxy (if present)
        shell: pwsh
        run: |
          if (Test-Path .\tg-proxy) {
            Copy-Item -Recurse -Force .\tg-proxy .\publish\tg-proxy
            Write-Host "TG WS Proxy bundled into publish/tg-proxy"
          } else {
            Write-Host "tg-proxy/ not found in repo - skipping (proxy will prompt for download on first use)"
          }

      - name: Create portable ZIP
        id: create_zip
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $zipName = "BSDPI_AI-v$ver-portable.zip"
          Compress-Archive -Path .\publish\* -DestinationPath ".\$zipName" -Force
          echo "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          Write-Host "Created $zipName"

      - name: Calculate SHA-256 hash
        id: sha256
        shell: pwsh
        run: |
          $zipName = "${{ steps.create_zip.outputs.zip_name }}"
          $hash = (Get-FileHash -Path ".\$zipName" -Algorithm SHA256).Hash
          echo "hash=$hash" >> $env:GITHUB_OUTPUT
          Write-Host "SHA-256: $hash"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: BSDPI AI ${{ steps.version.outputs.tag }}
          files: ${{ steps.create_zip.outputs.zip_name }}
          body: |
            ## BSDPI AI ${{ steps.version.outputs.tag }}

            **SHA-256:** `${{ steps.sha256.outputs.hash }}`

            Портабельный self-contained релиз для Windows 10/11 x64.
            Распакуйте `BSDPI_AI-v${{ steps.version.outputs.version }}-portable.zip` и запустите `BSDPI.exe` от имени администратора.
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BSDPI_AI-${{ steps.version.outputs.version }}
          path: ${{ steps.create_zip.outputs.zip_name }}
          retention-days: 30
