name: Build and Release BSDPI

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Read version from csproj
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content .\BSDPI\BSDPI.csproj
          $ver = $csproj.Project.PropertyGroup.Version
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "TAG=v$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Version: $ver, Tag: v$ver"

      - name: Verify tag matches version
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          $expectedTag = "v${{ steps.version.outputs.VERSION }}"
          $actualTag = "${{ github.ref_name }}"
          if ($actualTag -ne $expectedTag) {
            Write-Error "Tag mismatch: pushed tag '$actualTag' does not match version in .csproj '$expectedTag'. Please update the version in BSDPI.csproj before pushing the tag."
            exit 1
          }
          Write-Host "Tag '$actualTag' matches version in .csproj. OK."

      - name: Restore solution
        run: dotnet restore .\BSDPI.slnx

      - name: Run tests
        run: dotnet test .\BSDPI.slnx --configuration Release --no-restore

      - name: Publish win-x64
        run: dotnet publish .\BSDPI\BSDPI.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o .\publish

      - name: Bundle Flowseal engine
        shell: pwsh
        run: |
          # engine/ (winws.exe, WinDivert.dll, BAT-профили) не входит в сборку .NET,
          # но необходим для работы zapret. Копируем из репозитория в publish,
          # чтобы портабельный релиз был самодостаточным.
          if (Test-Path .\engine) {
            Copy-Item -Recurse -Force .\engine .\publish\engine
            Write-Host "Engine bundled into publish/engine"
          } else {
            Write-Warning "engine/ not found in repo — portable release will lack winws.exe"
          }

          # tg-proxy/ (Python embeddable + tg-ws-proxy исходники + cryptography/aiohttp)
          # уже собран в репозитории, чтобы пользователю не требовалось ничего качать
          # при первом запуске TG WS Proxy.
          if (Test-Path .\tg-proxy) {
            Copy-Item -Recurse -Force .\tg-proxy .\publish\tg-proxy
            Write-Host "TG WS Proxy bundled into publish/tg-proxy"
          } else {
            Write-Warning "tg-proxy/ not found in repo — TG proxy will require download on first run"
          }

      - name: Create ZIP
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.TAG }}"
          Compress-Archive -Path .\publish\* -DestinationPath ".\BSDPI-$tag-portable.zip" -Force

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.version.outputs.TAG }}"
          $zip = ".\BSDPI-$tag-portable.zip"

          gh release view $tag --repo "$env:GITHUB_REPOSITORY" *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zip --clobber --repo "$env:GITHUB_REPOSITORY"
          }
          else {
            gh release create $tag $zip `
              --title "$tag" `
              --generate-notes `
              --repo "$env:GITHUB_REPOSITORY"
          }
